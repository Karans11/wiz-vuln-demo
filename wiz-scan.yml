name: Build and Wiz CLI Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: wiz-vuln-demo
  TAG: ${{ github.sha }}

jobs:
  build-and-scan:
    name: Build image and scan with Wiz CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Build the Docker image with -t $TAG ----
      - name: Build Docker image
        run: |
          docker build -t ${IMAGE_NAME}:${TAG} .
          docker images ${IMAGE_NAME}:${TAG}

      # ---- Download and authenticate Wiz CLI ----
      - name: Download Wiz CLI
        run: |
          curl -o wizcli https://wizcli.app.wiz.io/latest/wizcli
          chmod +x wizcli

      - name: Authenticate to Wiz
        run: ./wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      # ---- Scan the built image for vulnerabilities + secrets ----
      - name: Wiz CLI - Scan container image
        run: |
          ./wizcli docker scan \
            --image ${IMAGE_NAME}:${TAG} \
            --policy "${{ secrets.WIZ_IMAGE_POLICY || 'default-vulnerabilities-policy' }}" \
            --output wiz-image-results.json,json,true

      # ---- Also run IaC scan on the Dockerfile itself ----
      - name: Wiz CLI - Scan Dockerfile (IaC)
        run: |
          ./wizcli iac scan \
            --path ./Dockerfile \
            --policy "${{ secrets.WIZ_IAC_POLICY || 'default-iac-policy' }}" \
            --output wiz-iac-results.json,json,true
        continue-on-error: true

      - name: Upload Wiz scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scan-results
          path: |
            wiz-image-results.json
            wiz-iac-results.json
